version: '3.8'
services:
  app:
    container_name: app_b
    build: ./docker/php
    ports:
      - "5174:5173"
    volumes:
      - ./src:/project
    networks:
      - shared_network

  nginx:
    container_name: nginx_b
    image: nginx
    ports:
      - "8001:80"
    volumes:
      - ./src:/project
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    working_dir: /project
    depends_on:
      - app
    networks:
      - shared_network

  db:
    container_name: db_b
    platform: linux/x86_64
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laraveldb_b
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: secret
      TZ: 'Asia/Tokyo'
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./docker/db/data:/var/lib/mysql
      - ./docker/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/db/sql:/docker-entrypoint-initdb.d
    ports:
      - 3307:3306
    networks:
      - shared_network

networks:
  shared_network:
    driver: bridge